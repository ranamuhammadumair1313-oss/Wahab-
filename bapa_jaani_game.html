// ---------------- AUDIO (Web Audio synthesized SFX) ----------------
let audioCtx = null;
let soundOn = true;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, duration, type='sine', vol=0.25, glideTo=null) {
  if (!soundOn) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, audioCtx.currentTime + duration);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function sfxFlap()  { beep(520, 0.10, 'square', 0.18, 720); }
function sfxScore() { beep(880, 0.12, 'triangle', 0.22, 1200); }
function sfxHit()   { beep(160, 0.35, 'sawtooth', 0.3, 60); }
function sfxClick()  { beep(600, 0.06, 'sine', 0.15, 800); }
function sfxStart() {
  beep(440, 0.1, 'sine', 0.2);
  setTimeout(()=>beep(660,0.15,'sine',0.2), 110);
}

}
resetGame();

function spawnPipe() {
  const margin = 60;
  const gapY = margin + Math.random() * (H - margin*2 - PIPE_GAP - 100);
  pipes.push({ x: W, gapY: gapY, passed: false });
}

// ---------------- BUTTON HIT-TESTING ----------------
let buttons = []; // list of {x,y,w,h,action} rebuilt each render for current screen

function addButton(x,y,w,h,action) {
  buttons.push({x,y,w,h,action});
}

function handlePress(px, py) {
  ensureAudio();
  // check buttons first
  for (const b of buttons) {
    if (px >= b.x && px <= b.x+b.w && py >= b.y && py <= b.y+b.h) {
      sfxClick();
      b.action();
      return;
    }
  }
  // fallback: tap on canvas during gameplay screens
  if (screen === 'ready') {
    screen = 'playing';
    sfxStart();
  } else if (screen === 'playing') {
    bird.vy = FLAP_POWER;
    sfxFlap();
  } else if (screen === 'over') {
    resetGame();
    screen = 'ready';
  }
}

// convert event coords to canvas coords (handles CSS scaling)
function getCanvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

canvas.addEventListener('mousedown', (e)=>{
  e.preventDefault();
  const {x,y} = getCanvasCoords(e.clientX, e.clientY);
  handlePress(x,y);
});
canvas.addEventListener('touchstart', (e)=>{
  e.preventDefault();
  const t = e.touches[0];
  const {x,y} = getCanvasCoords(t.clientX, t.clientY);
  handlePress(x,y);
}, {passive:false});

window.addEventListener('keydown', (e)=>{
  if (e.code === 'Space') {
    e.preventDefault();
    if (screen === 'ready') { screen='playing'; sfxStart(); }
    else if (screen === 'playing') { bird.vy = FLAP_POWER; sfxFlap(); }
    else if (screen === 'over') { resetGame(); screen='ready'; }
  }
});

// ---------------- DRAW HELPERS ----------------
function theme() { return themes[themeIndex]; }

function drawSky() {
  const t = theme();
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, t.sky[0]);
  grad.addColorStop(0.6, t.sky[1]);
  grad.addColorStop(1, t.sky[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
}

function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  for (let i=0;i<3;i++){
    const cx = ((frame*0.3 + i*160) % (W+80)) - 40;
    const cy = 80 + i*70;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 28, 14, 0, 0, Math.PI*2);
    ctx.ellipse(cx+20, cy+4, 20, 12, 0, 0, Math.PI*2);
    ctx.ellipse(cx-20, cy+4, 20, 12, 0, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawGround() {
  const t = theme();
  ctx.fillStyle = t.ground;
  ctx.fillRect(0, H-40, W, 40);
  ctx.fillStyle = t.groundEdge;
  ctx.fillRect(0, H-46, W, 8);
  const groundOffset = -(frame*PIPE_SPEED) % 20;
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 2;
  for (let x = groundOffset; x < W; x += 20) {
    ctx.beginPath();
    ctx.moveTo(x, H-40);
    ctx.lineTo(x+10, H);
    ctx.stroke();
  }
}

function drawPipes() {
  const t = theme();
  pipes.forEach(p=>{
    ctx.fillStyle = t.pipe;
    ctx.strokeStyle = t.pipeEdge;
    ctx.lineWidth = 3;
    ctx.fillRect(p.x, 0, PIPE_WIDTH, p.gapY);
    ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.gapY);
    ctx.fillRect(p.x-4, p.gapY-22, PIPE_WIDTH+8, 22);
    ctx.strokeRect(p.x-4, p.gapY-22, PIPE_WIDTH+8, 22);
    const bottomY = p.gapY + PIPE_GAP;
    ctx.fillRect(p.x, bottomY, PIPE_WIDTH, H - bottomY - 40);
    ctx.strokeRect(p.x, bottomY, PIPE_WIDTH, H - bottomY - 40);
    ctx.fillRect(p.x-4, bottomY, PIPE_WIDTH+8, 22);
    ctx.strokeRect(p.x-4, bottomY, PIPE_WIDTH+8, 22);
  });
}

function drawBirdSprite(x, y, r, rot, imgObj) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  const size = r*2.3;
  if (imgObj.complete && imgObj.naturalWidth > 0) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.clip();
    ctx.drawImage(imgObj, -size/2, -size/2, size, size);
    ctx.restore();
    ctx.strokeStyle = theme().accent;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.stroke();
  } else {
    ctx.fillStyle = '#ffd54f';
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawBird() {
  drawBirdSprite(bird.x, bird.y, bird.r, bird.rot, players[selectedPlayer].img);
}

function drawScore() {
  ctx.font = 'bold 44px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.strokeText(score, W/2, 90);
  ctx.fillText(score, W/2, 90);
}

function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawButton(x,y,w,h,label,action,fillStyle) {
  const t = theme();
  ctx.fillStyle = fillStyle || 'rgba(255,255,255,0.9)';
  roundRect(x,y,w,h,12);
  ctx.fill();
  ctx.strokeStyle = t.pipeEdge;
  ctx.lineWidth = 2.5;
  roundRect(x,y,w,h,12);
  ctx.stroke();
  ctx.fillStyle = '#222';
  ctx.font = 'bold 20px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x+w/2, y+h/2+2);
  ctx.textBaseline = 'alphabetic';
  addButton(x,y,w,h,action);
}

function drawTitle(text, y) {
  ctx.font = 'bold 34px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;
  ctx.strokeText(text, W/2, y);
  ctx.fillText(text, W/2, y);
}

// ---------------- SCREENS ----------------
function renderMenu() {
  drawSky(); drawClouds(); drawGround();
  drawBirdSprite(W/2, 220, 55, Math.sin(frame*0.05)*0.15, players[selectedPlayer].img);
  drawTitle('BAPA JAANI', 100);
  ctx.font = '16px Arial';
  ctx.fillStyle='#fff';
  ctx.textAlign='center';
  ctx.fillText('Flappy Adventure', W/2, 300);

  drawButton(W/2-90, 340, 180, 54, '▶ PLAY', ()=>{ resetGame(); screen='ready'; }, '#8bc34a');
  drawButton(W/2-90, 410, 180, 48, '🧑 Player', ()=>{ screen='charselect'; });
  drawButton(W/2-90, 470, 180, 48, '⚙ Settings', ()=>{ screen='settings'; });
  ctx.font='14px Arial';
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fillText('Best Score: ' + best, W/2, 545);
}

function renderCharSelect() {
  drawSky(); drawClouds(); drawGround();
  drawTitle('CHOOSE PLAYER', 90);

  const cardW = 150, cardH = 190;
  const gap = 20;
  const startX = W/2 - cardW - gap/2;
  players.forEach((p, i)=>{
    const x = startX + i*(cardW+gap);
    const y = 150;
    const isSelected = (i === selectedPlayer);
    ctx.fillStyle = isSelected ? 'rgba(255,213,79,0.35)' : 'rgba(255,255,255,0.2)';
    roundRect(x,y,cardW,cardH,14);
    ctx.fill();
    ctx.strokeStyle = isSelected ? theme().accent : '#fff';
    ctx.lineWidth = isSelected ? 4 : 2;
    roundRect(x,y,cardW,cardH,14);
    ctx.stroke();

    drawBirdSprite(x+cardW/2, y+75, 50, 0, p.img);

    ctx.font = 'bold 16px Arial';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(p.name, x+cardW/2, y+150);

    if (isSelected) {
      ctx.font = 'bold 14px Arial';
      ctx.fillStyle = theme().accent;
      ctx.fillText('✓ SELECTED', x+cardW/2, y+172);
    }

    addButton(x,y,cardW,cardH, ()=>{ selectedPlayer = i; });
  });

  drawButton(W/2-90, 400, 180, 48, '⬅ Back', ()=>{ screen='menu'; });
}

function renderSettings() {
  drawSky(); drawClouds(); drawGround();
  drawTitle('SETTINGS', 80);

  ctx.font='bold 18px Arial';
  ctx.fillStyle='#fff';
  ctx.textAlign='center';
  ctx.fillText('Theme', W/2, 130);

  const boxSize = 50, gapT = 12;
  const totalW = themes.length*boxSize + (themes.length-1)*gapT;
  let startX = W/2 - totalW/2;
  themes.forEach((t, i)=>{
    const x = startX + i*(boxSize+gapT);
    const y = 150;
    const grad = ctx.createLinearGradient(x,y,x,y+boxSize);
    grad.addColorStop(0, t.sky[0]);
    grad.addColorStop(1, t.sky[2]);
    ctx.fillStyle = grad;
    roundRect(x,y,boxSize,boxSize,10);
    ctx.fill();
    ctx.strokeStyle = (i===themeIndex) ? '#fff' : 'rgba(0,0,0,0.4)';
    ctx.lineWidth = (i===themeIndex) ? 4 : 2;
    roundRect(x,y,boxSize,boxSize,10);
    ctx.stroke();
    addButton(x,y,boxSize,boxSize, ()=>{ themeIndex = i; });
  });
  ctx.font='13px Arial';
  ctx.fillStyle='#fff';
  ctx.fillText(themes[themeIndex].name, W/2, 225);

  // Sound toggle
  ctx.font='bold 18px Arial';
  ctx.fillText('Sound', W/2, 275);
  drawButton(W/2-90, 290, 180, 50, soundOn ? '🔊 Sound: ON' : '🔇 Sound: OFF', ()=>{
    soundOn = !soundOn;
  }, soundOn ? '#8bc34a' : '#e57373');

  drawButton(W/2-90, 380, 180, 48, '⬅ Back', ()=>{ screen='menu'; });
}

function renderReady() {
  drawSky(); drawClouds(); drawGround();
  bird.y = H/2 + Math.sin(frame*0.06)*8;
  drawPipes();
  drawBird();
  drawScore();
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  roundRect(30, H/2-70, W-60, 140, 14);
  ctx.fill();
  ctx.strokeStyle = theme().accent;
  ctx.lineWidth = 3;
  roundRect(30, H/2-70, W-60, 140, 14);
  ctx.stroke();
  ctx.fillStyle = theme().accent;
  ctx.font = 'bold 24px Arial';
  ctx.textAlign='center';
  ctx.fillText('Get Ready!', W/2, H/2-20);
  ctx.font='16px Arial';
  ctx.fillStyle='#fff';
  ctx.fillText('Tap / Click / Space to fly', W/2, H/2+15);
  frame++;
}

function renderPlaying() {
  drawSky(); drawClouds();

  frame++;
  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.rot = Math.max(-0.5, Math.min(1.3, bird.vy * 0.06));

  if (frame % PIPE_INTERVAL === 0) spawnPipe();
  pipes.forEach(p=>{ p.x -= PIPE_SPEED; });
  pipes = pipes.filter(p=>p.x > -PIPE_WIDTH-10);
  pipes.forEach(p=>{
    if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
      p.passed = true;
      score++;
      sfxScore();
    }
  });

  let died = false;
  if (bird.y + bird.r > H-40 || bird.y - bird.r < 0) died = true;
  pipes.forEach(p=>{
    const inXRange = bird.x + bird.r > p.x && bird.x - bird.r < p.x + PIPE_WIDTH;
    if (inXRange) {
      if (bird.y - bird.r < p.gapY || bird.y + bird.r > p.gapY + PIPE_GAP) died = true;
    }
  });

  drawPipes();
  drawGround();
  drawBird();
  drawScore();

  if (died) {
    sfxHit();
    if (score > best) best = score;
    screen = 'over';
  }
}

function renderOver() {
  drawSky(); drawClouds(); drawGround();
  drawPipes();
  drawBird();
  drawScore();

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  roundRect(30, H/2-110, W-60, 220, 14);
  ctx.fill();
  ctx.strokeStyle = theme().accent;
  ctx.lineWidth = 3;
  roundRect(30, H/2-110, W-60, 220, 14);
  ctx.stroke();

  ctx.fillStyle = theme().accent;
  ctx.font = 'bold 28px Arial';
  ctx.textAlign='center';
  ctx.fillText('GAME OVER', W/2, H/2-65);
  ctx.font='18px Arial';
  ctx.fillStyle='#fff';
  ctx.fillText('Score: ' + score + '   Best: ' + best, W/2, H/2-30);

  drawButton(W/2-90, H/2-5, 180, 46, '🔄 Retry', ()=>{ resetGame(); screen='ready'; }, '#8bc34a');
  drawButton(W/2-90, H/2+50, 180, 42, '🏠 Home', ()=>{ resetGame(); screen='menu'; });
}

// ---------------- MAIN LOOP ----------------
function render() {
  buttons = [];
  ctx.clearRect(0,0,W,H);
  switch(screen) {
    case 'menu': renderMenu(); break;
    case 'charselect': renderCharSelect(); break;
    case 'settings': renderSettings(); break;
    case 'ready': renderReady(); break;
    case 'playing': renderPlaying(); break;
    case 'over': renderOver(); break;
  }
}

function loop() {
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
